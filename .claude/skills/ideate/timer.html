<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%92%A1%3C/text%3E%3C/svg%3E">
<title>Ideation Block</title>
<style>
  :root {
    --bg: #f0f6fc;
    --bg-top: #ffffff;
    --ink: #0a1f3d;
    --ink-soft: #5a6b85;
    --ink-faint: #aab7cc;
    --accent: #3b82f6;
    --accent-soft: #93c5fd;
    --ring-track: #dbeafe;
    --done-bg: #0a1f3d;
    --done-bg-alt: #1e3a8a;
    --success: #22c55e;
    --success-deep: #16a34a;
    --circ: 301.593;
    --serif: ui-serif, "New York", Georgia, "Times New Roman", serif;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: var(--sans);
    background: radial-gradient(ellipse at 50% -10%, var(--bg-top) 0%, var(--bg) 60%);
    color: var(--ink);
    overflow: hidden;
    user-select: none;
    -webkit-font-smoothing: antialiased;
    display: grid;
    place-items: center;
    transition: background 0.5s ease, color 0.5s ease;
    cursor: none;
  }
  body.cursor-show { cursor: default; }
  .toggle:hover { cursor: pointer; }

  /* Hide Chrome-in-Chrome MCP extension overlays — they pollute the calm look */
  #claude-phantom-cursor,
  #claude-agent-glow-border { display: none !important; }

  /* faint grid texture for atmosphere */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(to right, rgba(10,31,61,0.025) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(10,31,61,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    background-position: -1px -1px;
    transition: opacity 0.5s ease;
  }
  body.done::before { opacity: 0; }

  .stage {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2.5rem;
    z-index: 1;
  }

  .label {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 400;
    font-size: 1rem;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--ink-soft);
    padding-left: 0.42em; /* compensate for last-letter spacing */
    transition: color 0.5s ease;
  }

  .ring-wrap {
    position: relative;
    width: min(58vmin, 520px);
    height: min(58vmin, 520px);
    display: grid;
    place-items: center;
  }
  .ring {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }
  .ring circle {
    fill: none;
    stroke-width: 0.8;
    stroke-linecap: round;
  }
  .ring .track { stroke: var(--ring-track); }
  .ring .fill {
    stroke: var(--accent);
    stroke-dasharray: var(--circ);
    stroke-dashoffset: var(--circ);
    transition: stroke-dashoffset 0.4s linear, stroke 0.5s ease;
    filter: drop-shadow(0 0 6px rgba(59,130,246,0.25));
  }

  /* tiny tick marks at 12 o'clock */
  .ring-marker {
    position: absolute;
    top: -1px;
    left: 50%;
    width: 2px;
    height: 8px;
    background: var(--accent);
    transform: translateX(-50%);
    border-radius: 2px;
    transition: background 0.5s ease;
  }

  .countdown {
    position: relative;
    font-size: clamp(3.5rem, 13vmin, 8.5rem);
    font-weight: 200;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum" 1, "lnum" 1;
    letter-spacing: -0.04em;
    line-height: 1;
    color: var(--ink);
    display: flex;
    align-items: baseline;
    transition: color 0.5s ease;
  }
  .countdown .num { display: inline-block; }
  .countdown .colon {
    display: inline-block;
    color: var(--accent);
    margin: 0 0.04em;
    transform-origin: center;
    animation: breathe 1s ease-in-out infinite;
    transition: color 0.5s ease;
  }
  .countdown .hh, .countdown .sep1 { display: none; }
  .countdown.has-hours .hh,
  .countdown.has-hours .sep1 { display: inline-block; }

  @keyframes breathe {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.28; }
  }

  .controls {
    position: fixed;
    bottom: 7rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 1rem;
  }
  .btn {
    border: 0;
    padding: 0.85rem 2.5rem;
    font-family: var(--sans);
    font-size: 0.95rem;
    font-weight: 500;
    letter-spacing: 0;
    border-radius: 999px;
    min-width: 130px;
    cursor: pointer;
    transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease, transform 0.1s ease;
  }
  .btn:active { transform: scale(0.97); }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

  .btn-secondary {
    background: rgba(255,255,255,0.75);
    color: var(--ink);
    box-shadow: inset 0 0 0 1px rgba(10,31,61,0.08);
  }
  .btn-secondary:hover {
    background: #ffffff;
    box-shadow: inset 0 0 0 1px rgba(10,31,61,0.16);
  }

  .btn-primary {
    background: var(--accent);
    color: #ffffff;
    box-shadow: 0 4px 14px rgba(59,130,246,0.32);
  }
  .btn-primary:hover {
    background: #2563eb;
    box-shadow: 0 6px 18px rgba(59,130,246,0.4);
  }

  body.paused .btn-primary {
    background: var(--success);
    box-shadow: 0 4px 14px rgba(34,197,94,0.32);
  }
  body.paused .btn-primary:hover {
    background: var(--success-deep);
    box-shadow: 0 6px 18px rgba(34,197,94,0.4);
  }

  body.paused .colon {
    animation-play-state: paused;
    opacity: 0.28;
  }
  body.paused .ring .fill { transition: none; }

  /* Cancelled state — calm exit, no flash/beep */
  body.cancelled .controls { display: none; }
  body.cancelled .colon { animation: none; opacity: 0.28; }

  /* DONE state — cohesive navy palette, not red */
  body.done {
    background: var(--done-bg);
    color: #ffffff;
    animation: doneFlash 1.4s ease-in-out infinite;
  }
  body.done .label { color: rgba(255,255,255,0.55); }
  body.done .countdown { color: #ffffff; letter-spacing: 0.02em; }
  body.done .ring .track { stroke: rgba(255,255,255,0.08); }
  body.done .ring .fill { stroke: var(--accent-soft); filter: drop-shadow(0 0 12px rgba(147,197,253,0.5)); }
  body.done .ring-marker { background: var(--accent-soft); }
  body.done .controls { display: none; }

  @keyframes doneFlash {
    0%, 100% { background: var(--done-bg); }
    50% { background: var(--done-bg-alt); }
  }

  @media (prefers-reduced-motion: reduce) {
    body.done { animation: none; }
    .colon { animation: none; }
    .ring .fill { transition: none; }
  }

  @media (max-width: 480px) {
    .stage { gap: 1.75rem; }
    .controls { bottom: 4rem; gap: 0.6rem; }
    .btn { padding: 0.75rem 1.6rem; min-width: 110px; font-size: 0.875rem; }
    body::before { background-size: 32px 32px; }
  }
</style>
</head>
<body>
  <main class="stage">
    <p class="label">Ideation Block</p>
    <div class="ring-wrap">
      <svg class="ring" viewBox="0 0 100 100" aria-hidden="true">
        <circle class="track" cx="50" cy="50" r="48"/>
        <circle class="fill"  cx="50" cy="50" r="48" id="ring"/>
      </svg>
      <span class="ring-marker" aria-hidden="true"></span>
      <div class="countdown" id="cd">
        <span class="num hh" id="hh">0</span><span class="colon sep1">:</span><span class="num" id="mm">--</span><span class="colon">:</span><span class="num" id="ss">--</span>
      </div>
    </div>
  </main>
  <div class="controls" id="controls">
    <button class="btn btn-secondary" id="cancel" type="button">Cancel</button>
    <button class="btn btn-primary" id="toggle" type="button">Pause</button>
  </div>
<script>
(() => {
  const params = new URLSearchParams(location.search);
  const total = Math.max(1, parseInt(params.get('s'), 10) || 1800);

  const cd = document.getElementById('cd');
  const hh = document.getElementById('hh');
  const mm = document.getElementById('mm');
  const ss = document.getElementById('ss');
  const ring = document.getElementById('ring');
  const toggle = document.getElementById('toggle');
  const cancel = document.getElementById('cancel');

  if (total >= 3600) cd.classList.add('has-hours');

  let started = Date.now();
  let pausedAt = null;
  let totalPaused = 0;
  let done = false;
  let audioReady = false;
  let audioCtx = null;

  const pad = (n) => String(n).padStart(2, '0');

  const render = (remaining) => {
    const h = Math.floor(remaining / 3600);
    const m = Math.floor((remaining % 3600) / 60);
    const s = remaining % 60;
    if (cd.classList.contains('has-hours')) {
      hh.textContent = h;
      mm.textContent = pad(m);
      ss.textContent = pad(s);
      document.title = `${h}:${pad(m)}:${pad(s)} · Ideation`;
    } else {
      mm.textContent = pad(m);
      ss.textContent = pad(s);
      document.title = `${pad(m)}:${pad(s)} · Ideation`;
    }
  };

  const beep = () => {
    if (!audioCtx) return;
    const seq = [880, 880, 880, 880, 1320, 1320];
    seq.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      const t = audioCtx.currentTime + i * 0.45;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.25, t + 0.02);
      gain.gain.linearRampToValueAtTime(0, t + 0.32);
      osc.start(t); osc.stop(t + 0.4);
    });
  };

  const enableAudio = () => {
    if (audioReady) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioReady = true;
    } catch (e) {}
  };

  const togglePause = () => {
    if (done) return;
    if (pausedAt === null) {
      pausedAt = Date.now();
      document.body.classList.add('paused');
      toggle.textContent = 'Resume';
    } else {
      totalPaused += Date.now() - pausedAt;
      pausedAt = null;
      document.body.classList.remove('paused');
      toggle.textContent = 'Pause';
    }
  };

  const cancelTimer = () => {
    if (done) return;
    done = true;
    document.body.classList.add('cancelled');
    cd.innerHTML = '<span class="num">ENDED</span>';
    document.title = 'Ended · Ideation';
  };

  document.body.addEventListener('click', enableAudio);
  document.body.addEventListener('keydown', enableAudio);
  toggle.addEventListener('click', (e) => {
    e.stopPropagation();
    enableAudio();
    togglePause();
  });
  cancel.addEventListener('click', (e) => {
    e.stopPropagation();
    enableAudio();
    cancelTimer();
  });
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.key === ' ') {
      e.preventDefault();
      enableAudio();
      togglePause();
    }
  });

  if ('Notification' in window && Notification.permission === 'default') {
    try { Notification.requestPermission(); } catch (e) {}
  }

  // Auto-hide cursor after 2s of no movement (video-player style)
  let cursorTimer;
  const showCursor = () => {
    document.body.classList.add('cursor-show');
    clearTimeout(cursorTimer);
    cursorTimer = setTimeout(() => document.body.classList.remove('cursor-show'), 2000);
  };
  document.addEventListener('mousemove', showCursor);

  const tick = () => {
    if (done) return;
    const now = pausedAt ?? Date.now();
    const elapsed = (now - started - totalPaused) / 1000;
    const remaining = Math.max(0, Math.ceil(total - elapsed));
    render(remaining);

    const progress = Math.min(1, Math.max(0, elapsed / total));
    ring.style.strokeDashoffset = (1 - progress) * 301.593;

    if (remaining === 0) {
      done = true;
      document.body.classList.add('done');
      cd.innerHTML = '<span class="num">TIME</span>';
      document.title = 'TIME · Ideation';
      ring.style.strokeDashoffset = 0;
      try { beep(); } catch (e) {}
      try {
        if ('Notification' in window && Notification.permission === 'granted') {
          new Notification('/ideate', { body: 'Block done — time to package what you have' });
        }
      } catch (e) {}
      return;
    }
    setTimeout(tick, 200);
  };

  tick();
})();
</script>
</body>
</html>
